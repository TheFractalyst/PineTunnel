name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

      - name: Test summary
        if: always()
        run: |
          echo "Tests completed."
          echo "83 tests covering parser, validator, metrics, security, and crypto modules."
