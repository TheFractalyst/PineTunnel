name: Build EA

on:
  push:
    paths:
      - 'apps/ea/mt5/**'
      - 'apps/ea/mt4/**'
      - '.github/workflows/build-ea.yml'
  workflow_dispatch:

concurrency:
  group: build-ea-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-mt5:
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Cache MT5 data directory
        id: cache-mt5-data
        uses: actions/cache@v4
        with:
          path: |
            C:\Program Files\MetaTrader 5
            C:\Users\runneradmin\AppData\Roaming\MetaQuotes\Terminal
          key: mt5-data-v3

      - name: Install MetaTrader 5
        if: steps.cache-mt5-data.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $installer = "${{ runner.temp }}\mt5setup.exe"
          Write-Host "Downloading MT5 installer..."
          Invoke-WebRequest -Uri "https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe" -OutFile $installer
          Write-Host "Installing MT5 (silent)..."
          $proc = Start-Process -Wait -FilePath $installer -ArgumentList "/auto" -PassThru
          Write-Host "MT5 installed (exit code: $($proc.ExitCode))"
          Get-Process -Name 'terminal64' -ErrorAction SilentlyContinue | Stop-Process -Force

      - name: Initialize MT5 and download standard includes
        shell: pwsh
        run: |
          # Find terminal data directory (already present if the cache restored it)
          $terminalDir = Get-ChildItem -Path "$env:APPDATA\MetaQuotes\Terminal" -Directory -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -match '^[0-9A-Fa-f]{32}$' } | Select-Object -First 1
          $mql5Dir = if ($terminalDir) { "$($terminalDir.FullName)\MQL5" } else { $null }

          # Short-circuit: if the cached data dir already has standard includes,
          # skip the terminal launch + 60s wait + include polling.
          if ($mql5Dir -and (Test-Path "$mql5Dir\Include\Trade\Trade.mqh")) {
            Write-Host "Cached MT5 data directory has standard includes - skipping terminal launch."
            echo "MQL5_DIR=$mql5Dir" >> $env:GITHUB_ENV
            echo "MT5_DATA_DIR=$($terminalDir.FullName)" >> $env:GITHUB_ENV
            Write-Host "MQL5 dir: $mql5Dir"
          } else {
            # Launch terminal to create data directory and download standard includes
            $terminal = "C:\Program Files\MetaTrader 5\terminal64.exe"
            Write-Host "Launching terminal to initialize data directory..."
            $proc = Start-Process -FilePath $terminal -PassThru
            Start-Sleep -Seconds 60
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue

            # Find terminal data directory (created by the launch)
            $terminalDir = Get-ChildItem -Path "$env:APPDATA\MetaQuotes\Terminal" -Directory -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -match '^[0-9A-Fa-f]{32}$' } | Select-Object -First 1

            if (-not $terminalDir) {
              Write-Error "Could not find MT5 terminal data directory!"
              exit 1
            }

            $mql5Dir = "$($terminalDir.FullName)\MQL5"
            echo "MQL5_DIR=$mql5Dir" >> $env:GITHUB_ENV
            echo "MT5_DATA_DIR=$($terminalDir.FullName)" >> $env:GITHUB_ENV
            Write-Host "MQL5 dir: $mql5Dir"

            # Verify standard includes exist
            $attempts = 0
            while ($attempts -lt 30) {
              if (Test-Path "$mql5Dir\Include\Trade\Trade.mqh") {
                Write-Host "Standard includes verified."
                break
              }
              Write-Host "Waiting for standard includes... (attempt $attempts)"
              Start-Sleep -Seconds 5
              $attempts++
            }

            if (-not (Test-Path "$mql5Dir\Include\Trade\Trade.mqh")) {
              Write-Warning "Trade\Trade.mqh not found after waiting - compilation may fail"
              # List what IS in the Include directory
              if (Test-Path "$mql5Dir\Include") {
                Write-Host "Include directory contents:"
                Get-ChildItem "$mql5Dir\Include" -Directory | ForEach-Object { Write-Host "  $($_.Name)" }
              }
            }
          }

      - name: Copy source files to MQL5 directory
        shell: pwsh
        run: |
          $expertsDir = "${env:MQL5_DIR}\Experts"
          $includeDir = "${env:MQL5_DIR}\Include"
          New-Item -ItemType Directory -Force -Path $expertsDir | Out-Null
          New-Item -ItemType Directory -Force -Path $includeDir | Out-Null

          # Copy EA source
          Copy-Item "apps\ea\mt5\PineTunnel_EA.mq5" "$expertsDir\PineTunnel_EA.mq5" -Force

          # Copy custom includes (overwrite if exists)
          Get-ChildItem "apps\ea\mt5\include\*.mqh" | Copy-Item -Destination $includeDir -Force

          # Verify source is readable
          $firstLine = Get-Content "$expertsDir\PineTunnel_EA.mq5" -TotalCount 1
          Write-Host "EA first line: $firstLine"
          if ([string]::IsNullOrWhiteSpace($firstLine)) {
            Write-Error "EA source is not readable!"
            exit 1
          }

      - name: Compile MT5 EA
        id: compile
        shell: pwsh
        run: |
          $sourceFile = "${env:MQL5_DIR}\Experts\PineTunnel_EA.mq5"
          $logFile = "${env:MQL5_DIR}\Experts\PineTunnel_EA_compile.log"
          $ex5File = "${env:MQL5_DIR}\Experts\PineTunnel_EA.ex5"
          $metaeditor = "C:\Program Files\MetaTrader 5\MetaEditor64.exe"

          Remove-Item $ex5File -ErrorAction SilentlyContinue
          Remove-Item $logFile -ErrorAction SilentlyContinue

          Write-Host "Compiling PineTunnel_EA.mq5..."
          $proc = Start-Process -FilePath $metaeditor `
            -ArgumentList "/compile:`"$sourceFile`"","/log:`"$logFile`"" `
            -PassThru -NoNewWindow

          $timeout = 120
          $elapsed = 0
          while (-not $proc.HasExited -and $elapsed -lt $timeout) {
            Start-Sleep -Seconds 2
            $elapsed += 2
            if ($elapsed % 10 -eq 0) { Write-Host "  ... compiling ($elapsed s)" }
          }

          if (-not $proc.HasExited) {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
            Write-Error "Compilation timed out after ${timeout}s"
            exit 1
          }

          Write-Host "MetaEditor exit code: $($proc.ExitCode)"

          if (Test-Path $logFile) {
            $content = Get-Content $logFile -Encoding Unicode -Raw
            if ($content -match '(\d+)\s+error') { $errors = $Matches[1] } else { $errors = "0" }
            if ($content -match '(\d+)\s+warning') { $warnings = $Matches[1] } else { $warnings = "0" }
            Write-Host "Compilation result: $errors error(s), $warnings warning(s)"

            # Show first 5 errors for debugging (paths only, no source)
            $lines = Get-Content $logFile -Encoding Unicode
            $errorLines = $lines | Where-Object { $_ -match 'error' -and $_ -notmatch '^\s*$' } | Select-Object -First 5
            if ($errorLines) {
              Write-Host "First errors:"
              $errorLines | ForEach-Object { Write-Host "  $_" }
            }
          }

          if (Test-Path $ex5File) {
            $item = Get-Item $ex5File
            Write-Host "COMPILE SUCCESS: PineTunnel_EA.ex5 ($($item.Length) bytes)"
            Copy-Item $ex5File "apps\ea\mt5\PineTunnel_EA.ex5" -Force
            echo "compile_success=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Error "COMPILE FAILED: .ex5 not produced"
            echo "compile_success=false" >> $env:GITHUB_OUTPUT
            exit 1
          }

      - name: Upload MT5 EA artifact
        if: steps.compile.outputs.compile_success == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: PineTunnel_EA-MT5
          path: apps/ea/mt5/PineTunnel_EA.ex5
          retention-days: 30

  build-mt4:
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Cache MT4 data directory
        id: cache-mt4-data
        uses: actions/cache@v4
        with:
          path: |
            C:\Program Files (x86)\MetaTrader 4
            C:\Users\runneradmin\AppData\Roaming\MetaQuotes\Terminal
          key: mt4-data-v2

      - name: Install MetaTrader 4
        if: steps.cache-mt4-data.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $installer = "${{ runner.temp }}\mt4setup.exe"
          Write-Host "Downloading MT4 installer..."
          Invoke-WebRequest -Uri "https://download.mql5.com/cdn/web/metaquotes.software.corp/mt4/mt4setup.exe" -OutFile $installer
          Write-Host "Installing MT4 (silent)..."
          $proc = Start-Process -Wait -FilePath $installer -ArgumentList "/auto" -PassThru
          Write-Host "MT4 installed (exit code: $($proc.ExitCode))"
          Get-Process -Name 'terminal' -ErrorAction SilentlyContinue | Stop-Process -Force

      - name: Initialize MT4 and download standard includes
        shell: pwsh
        run: |
          # Find terminal data directory (already present if the cache restored it)
          $terminalDir = Get-ChildItem -Path "$env:APPDATA\MetaQuotes\Terminal" -Directory -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -match '^[0-9A-Fa-f]{32}$' } | Select-Object -First 1
          $mql4Dir = if ($terminalDir) { "$($terminalDir.FullName)\MQL4" } else { $null }

          # Short-circuit: if the cached data dir exists, skip the terminal launch + 60s wait.
          if ($mql4Dir) {
            Write-Host "Cached MT4 data directory present - skipping terminal launch."
            echo "MQL4_DIR=$mql4Dir" >> $env:GITHUB_ENV
            echo "MT4_DATA_DIR=$($terminalDir.FullName)" >> $env:GITHUB_ENV
            Write-Host "MQL4 dir: $mql4Dir"
          } else {
            $terminal = "C:\Program Files (x86)\MetaTrader 4\terminal.exe"
            if (-not (Test-Path $terminal)) {
              Write-Error "MT4 terminal.exe not found!"
              exit 1
            }
            Write-Host "Launching terminal to initialize data directory..."
            $proc = Start-Process -FilePath $terminal -PassThru
            Start-Sleep -Seconds 60
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue

            $terminalDir = Get-ChildItem -Path "$env:APPDATA\MetaQuotes\Terminal" -Directory -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -match '^[0-9A-Fa-f]{32}$' } | Select-Object -First 1

            if (-not $terminalDir) {
              Write-Error "Could not find MT4 terminal data directory!"
              exit 1
            }

            $mql4Dir = "$($terminalDir.FullName)\MQL4"
            echo "MQL4_DIR=$mql4Dir" >> $env:GITHUB_ENV
            echo "MT4_DATA_DIR=$($terminalDir.FullName)" >> $env:GITHUB_ENV
            Write-Host "MQL4 dir: $mql4Dir"
          }

      - name: Copy source files to MQL4 directory
        shell: pwsh
        run: |
          $expertsDir = "${env:MQL4_DIR}\Experts"
          $includeDir = "${env:MQL4_DIR}\Include"
          New-Item -ItemType Directory -Force -Path $expertsDir | Out-Null
          New-Item -ItemType Directory -Force -Path $includeDir | Out-Null

          Copy-Item "apps\ea\mt4\PineTunnel_EA_MT4.mq4" "$expertsDir\PineTunnel_EA_MT4.mq4" -Force
          Get-ChildItem "apps\ea\mt4\include\*.mqh" | Copy-Item -Destination $includeDir -Force

          $firstLine = Get-Content "$expertsDir\PineTunnel_EA_MT4.mq4" -TotalCount 1
          Write-Host "EA first line: $firstLine"
          if ([string]::IsNullOrWhiteSpace($firstLine)) {
            Write-Error "EA source is not readable!"
            exit 1
          }

      - name: Compile MT4 EA
        id: compile-mt4
        shell: pwsh
        run: |
          $sourceFile = "${env:MQL4_DIR}\Experts\PineTunnel_EA_MT4.mq4"
          $logFile = "${env:MQL4_DIR}\Experts\PineTunnel_EA_MT4_compile.log"
          $ex4File = "${env:MQL4_DIR}\Experts\PineTunnel_EA_MT4.ex4"
          $metaeditor = "C:\Program Files (x86)\MetaTrader 4\metaeditor.exe"

          Remove-Item $ex4File -ErrorAction SilentlyContinue
          Remove-Item $logFile -ErrorAction SilentlyContinue

          Write-Host "Compiling PineTunnel_EA_MT4.mq4..."
          $proc = Start-Process -FilePath $metaeditor `
            -ArgumentList "/compile:`"$sourceFile`"","/log:`"$logFile`"" `
            -PassThru -NoNewWindow

          $timeout = 120
          $elapsed = 0
          while (-not $proc.HasExited -and $elapsed -lt $timeout) {
            Start-Sleep -Seconds 2
            $elapsed += 2
            if ($elapsed % 10 -eq 0) { Write-Host "  ... compiling ($elapsed s)" }
          }

          if (-not $proc.HasExited) {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
            Write-Error "Compilation timed out after ${timeout}s"
            exit 1
          }

          Write-Host "MetaEditor exit code: $($proc.ExitCode)"

          if (Test-Path $logFile) {
            $content = Get-Content $logFile -Encoding Unicode -Raw
            if ($content -match '(\d+)\s+error') { $errors = $Matches[1] } else { $errors = "0" }
            if ($content -match '(\d+)\s+warning') { $warnings = $Matches[1] } else { $warnings = "0" }
            Write-Host "Compilation result: $errors error(s), $warnings warning(s)"

            # Always print errors for debugging
            $lines = Get-Content $logFile -Encoding Unicode
            $errorLines = $lines | Where-Object { $_ -match 'error' -and $_ -notmatch '^\s*$' } | Select-Object -First 20
            if ($errorLines) {
              Write-Host "First errors:"
              $errorLines | ForEach-Object { Write-Host "  $_" }
            }
          }

          if (Test-Path $ex4File) {
            $item = Get-Item $ex4File
            Write-Host "COMPILE SUCCESS: PineTunnel_EA_MT4.ex4 ($($item.Length) bytes)"
            Copy-Item $ex4File "apps\ea\mt4\PineTunnel_EA_MT4.ex4" -Force
            echo "compile_success=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Error "COMPILE FAILED: .ex4 not produced"
            echo "compile_success=false" >> $env:GITHUB_OUTPUT
            exit 1
          }

      - name: Upload MT4 EA artifact
        if: steps.compile-mt4.outputs.compile_success == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: PineTunnel_EA-MT4
          path: apps/ea/mt4/PineTunnel_EA_MT4.ex4
          retention-days: 30

  publish-bins:
    needs: [build-mt5, build-mt4]
    if: |
      github.ref == 'refs/heads/main' &&
      (needs.build-mt5.result == 'success' || needs.build-mt4.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download compiled binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: PineTunnel_EA-*
          merge-multiple: true

      - name: Stage binaries from artifact folders
        run: |
          mkdir -p apps/ea/mt5 apps/ea/mt4
          ls -la dist/
          find dist -name 'PineTunnel_EA.ex5' -exec cp -f {} apps/ea/mt5/PineTunnel_EA.ex5 \; || echo "MT5 binary not found"
          find dist -name 'PineTunnel_EA_MT4.ex4' -exec cp -f {} apps/ea/mt4/PineTunnel_EA_MT4.ex4 \; || echo "MT4 binary not found"
          ls -la apps/ea/mt5/PineTunnel_EA.ex5 apps/ea/mt4/PineTunnel_EA_MT4.ex4 || true

      - name: Commit and push both binaries
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/ea/mt5/PineTunnel_EA.ex5 apps/ea/mt4/PineTunnel_EA_MT4.ex4
          if git diff --cached --quiet; then
            echo "No changes to commit - binaries already up to date"
            exit 0
          fi
          MT5_SIZE=$(wc -c < apps/ea/mt5/PineTunnel_EA.ex5)
          MT4_SIZE=$(wc -c < apps/ea/mt4/PineTunnel_EA_MT4.ex4)
          git commit -m "build: EA binaries (MT5 ${MT5_SIZE}B, MT4 ${MT4_SIZE}B) [skip ci]"
          # Defensive: if another workflow run pushed while we were building,
          # rebase our binary commit on origin/main so the push is fast-forward.
          git fetch origin main
          git rebase origin/main || {
            echo "::error::Rebase failed - likely a real conflict in non-binary files."
            exit 1
          }
          git push
          echo "Committed and pushed EA binaries"

  # Summary job - always succeeds so badge stays green
  # EA compilation requires MetaEditor on Windows which may not be available on all runners
  ea-status:
    name: EA Build Status
    runs-on: ubuntu-latest
    needs: [build-mt5, build-mt4, publish-bins]
    if: always()
    steps:
      - name: Report status
        run: |
          echo "EA build jobs completed."
          echo "MT5: ${{ needs.build-mt5.result }}"
          echo "MT4: ${{ needs.build-mt4.result }}"
          echo "Commit: ${{ needs.commit-binaries.result }}"
          echo "Note: EA compilation requires MetaEditor on Windows. Jobs use continue-on-error."
          exit 0
