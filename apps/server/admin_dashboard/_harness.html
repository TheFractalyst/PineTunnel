<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PineTunnel Setup Harness</title>
<link rel="stylesheet" href="styles.css">
<style>
  body { background: var(--bg); }
</style>
</head>
<body>
<div id="app"></div>
<script>
(function() {
  const MOCK = {
    "/api/dashboard/setup-status": {
      initialized: false,
      telegram_configured: false,
      cloudflare_configured: false,
      bot_username: "",
      server_url: "",
    },
    "/api/dashboard/bot-info": { started: true, username: "pinetunnel_bot", first_name: "PineTunnel", handler_count: 5, admin_ids: ["123"], alerts_enabled: true },
    "/api/dashboard/webhook-url": { url: "https://pinetunnel.example.com/api/webhook/abc123" },
    "/api/system/health": { uptime_seconds: 3600, system: { cpu_percent: 12, memory_percent: 45, disk_percent: 60 } },
    "/api/connections": { http_polling_connections: 2, websocket: { websocket_connections: 1 } },
    "/api/system/stats": { trades: { today: 5, success_rate_7d: 0.85 } },
  };
  let cfgOverrides = {};
  function snapshot() {
    const base = Object.assign({}, MOCK["/api/dashboard/setup-status"], cfgOverrides);
    return base;
  }
  const realFetch = window.fetch.bind(window);
  window.fetch = async function(url, opts) {
    const u = String(url);
    if (u === "/api/dashboard/setup-status") {
      return new Response(JSON.stringify(snapshot()), { status: 200, headers: { "content-type": "application/json" } });
    }
    if (u === "/api/dashboard/bot-info") {
      return new Response(JSON.stringify(MOCK["/api/dashboard/bot-info"]), { status: 200, headers: { "content-type": "application/json" } });
    }
    if (u === "/api/dashboard/webhook-url") {
      return new Response(JSON.stringify(MOCK["/api/dashboard/webhook-url"]), { status: 200, headers: { "content-type": "application/json" } });
    }
    if (u === "/api/system/health") {
      return new Response(JSON.stringify(MOCK["/api/system/health"]), { status: 200, headers: { "content-type": "application/json" } });
    }
    if (u === "/api/connections") {
      return new Response(JSON.stringify(MOCK["/api/connections"]), { status: 200, headers: { "content-type": "application/json" } });
    }
    if (u === "/api/system/stats") {
      return new Response(JSON.stringify(MOCK["/api/system/stats"]), { status: 200, headers: { "content-type": "application/json" } });
    }
    if (u === "/api/dashboard/config" && opts && opts.method === "PUT") {
      const body = JSON.parse(opts.body);
      if (body.updates && body.updates.TELEGRAM_BOT_TOKEN) {
        cfgOverrides.telegram_configured = true;
        cfgOverrides.bot_username = "@pinetunnel_bot";
      }
      if (body.updates && body.updates.SERVER_BASE_URL) {
        cfgOverrides.cloudflare_configured = true;
        cfgOverrides.server_url = body.updates.SERVER_BASE_URL;
      }
      return new Response(JSON.stringify({ status: "ok", updated_keys: Object.keys(body.updates), needs_restart: false }), { status: 200, headers: { "content-type": "application/json" } });
    }
    return new Response("{}", { status: 200, headers: { "content-type": "application/json" } });
  };
  window.__harnessSetStep = function(step) {
    try { sessionStorage.setItem("setup-wizard-step", String(step)); } catch {}
  };
  window.__harnessReset = function() {
    cfgOverrides = {};
    try { sessionStorage.removeItem("setup-wizard-step"); } catch {}
  };
})();
</script>
<script src="app.js"></script>
<script>
  window.addEventListener("load", function() {
    setTimeout(function() {
      if (window.route) window.route("setup");
    }, 100);
  });
</script>
</body>
</html>
